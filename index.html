<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Balmora</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    color-scheme: dark;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
    background: #000;
    overflow: hidden;
  }

  body {
    font-family: 'Cormorant Garamond', 'Garamond', serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .stage {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    animation: stageIn 2.4s ease-out forwards;
  }

  @keyframes stageIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .image-wrap {
    position: relative;
    width: 100%;
    height: 100%;
  }

  .art {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 900ms ease-in-out;
  }

  #art-color {
    opacity: 1;
  }

  #art-gray {
    opacity: 0;
  }

  .stage.hovering #art-color {
    opacity: 0;
  }

  .stage.hovering #art-gray {
    opacity: 1;
  }

  .veil {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 800ms ease-in-out;
    z-index: 5;
  }

  .veil.active {
    opacity: 1;
  }

  .leave-button {
    position: absolute;
    bottom: 8%;
    left: 50%;
    transform: translateX(-50%);
    background: transparent;
    border: 1px solid rgba(245, 245, 240, 0.45);
    color: #f2f0e9;
    font-family: 'Cormorant Garamond', 'Garamond', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 1.15rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    padding: 0.9em 2.4em;
    cursor: pointer;
    z-index: 10;
    transition: opacity 700ms ease-in-out, border-color 500ms ease, color 500ms ease, background 500ms ease;
  }

  .leave-button:hover,
  .leave-button:focus-visible {
    border-color: rgba(245, 245, 240, 0.85);
    background: rgba(255, 255, 255, 0.04);
    outline: none;
  }

  .leave-button.fading {
    opacity: 0;
    pointer-events: none;
  }

  @media (max-width: 600px) {
    .leave-button {
      font-size: 0.95rem;
      letter-spacing: 0.25em;
      padding: 0.8em 1.8em;
      bottom: 6%;
    }
  }
</style>
</head>
<body>

<div class="stage" id="stage">
  <div class="image-wrap">
    <img id="art-color" class="art" src="images/balmora-color.png" alt="Balmora, Morrowind">
    <img id="art-gray" class="art" src="images/balmora-grayscale.webp" alt="">
  </div>
  <button id="leave" class="leave-button">Take your leave</button>
  <div id="veil" class="veil"></div>
</div>

<script>
  const stage = document.getElementById('stage');
  const button = document.getElementById('leave');
  const veil = document.getElementById('veil');

  button.addEventListener('mouseenter', () => stage.classList.add('hovering'));
  button.addEventListener('mouseleave', () => stage.classList.remove('hovering'));
  button.addEventListener('focus', () => stage.classList.add('hovering'));
  button.addEventListener('blur', () => stage.classList.remove('hovering'));

  button.addEventListener('click', () => {
    button.disabled = true;
    veil.classList.add('active');

    setTimeout(() => {
      button.classList.add('fading');
    }, 800);

    setTimeout(() => {
      window.close();
    }, 1600);
  });
</script>

</body>
</html>
